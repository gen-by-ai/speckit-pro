schema_version: "1.0"

extension:
  id: "pro"
  name: "SpecKit Pro"
  version: "1.13"
  description: "Autonomous long-run orchestration layered on native SpecKit commands — hooks, generator/evaluator loop, sprint contracts with edge-case matrix + browser-test rows, replayable agent-browser test scripts with regression carry-forward, stub/no-op auto-fail gate, branch-symmetry enforcement, post-implement drift reconciliation, repo-level knowledge-base prime/sync, adversarial spec deepener with capability-based source discovery + edge-case depth checklist, context resets, AGENT.md self-update, rich progress tracking, overlap-aware pre-flight, PR-safe checkpoints, pickup-existing-feature workflow, local Ollama sidecar (prep/materialize/first-pass review) with evidence-pack discipline so Claude becomes a premium worker not the whole factory"
  author: "speckit-pro"
  repository: "https://github.com/github/spec-kit-pro"
  license: "MIT"
  homepage: "https://github.com/github/spec-kit-pro"

requires:
  speckit_version: ">=0.8.0"
  tools:
    - name: git
      required: false
      version: ">=2.0.0"

provides:
  commands:
    # ── Entry point ──────────────────────────────────────────────────────────
    - name: speckit.pro.go
      file: commands/pro.go.md
      description: "Run the full SDD pipeline by invoking native SpecKit commands in sequence with Pro quality gates between phases"
      aliases: ["speckit.pro.run"]

    # ── Hook commands (also callable manually) ────────────────────────────────
    - name: speckit.pro.contract
      file: commands/pro.contract.md
      description: "Generate a sprint contract from tasks.md — defines acceptance criteria before implementation starts. Fires automatically after /speckit.tasks"

    - name: speckit.pro.checkpoint
      file: commands/pro.checkpoint.md
      description: "Create a named checkpoint: commit all changes, save session snapshot, log progress"

    - name: speckit.pro.evaluate
      file: commands/pro.evaluate.md
      description: "Strict QA evaluation of a completed sprint against the sprint contract — generator/evaluator split. Fires automatically after /speckit.implement"

    - name: speckit.pro.reconcile
      file: commands/pro.reconcile.md
      description: "Post-implement spec drift review — writes pro-drift.md comparing spec/plan/tasks to code; run before evaluate for living-spec discipline"

    - name: speckit.pro.knowledge-sync
      file: commands/pro.knowledge-sync.md
      description: "Repo-level knowledge-base sync — primes new specs with `.repo-knowledge/` context (before_specify) and reconciles claims vs code after evaluator PASS (after_implement). Writes pro-knowledge.md proposals; never silently mutates the knowledge base"

    - name: speckit.pro.deepen
      file: commands/pro.deepen.md
      description: "Adversarial spec deepener — audits the draft spec against a depth checklist (data model, invariants, failure modes, side effects, glossary, …), investigates gaps autonomously from local sources and any capability-matched external sources (issue tracker, docs system), and asks the operator only what no source can answer. Writes spec-patches.md (cited proposals) + spec-questions.md (human input). Use --apply to merge as a diff."

    # ── Loop worker (invoked by orchestrator script) ───────────────────────────
    - name: speckit.pro.loop
      file: commands/pro.loop.md
      description: "Autonomous implementation loop — single iteration worker: implements one work unit, signals status"

    # ── Observability & recovery ───────────────────────────────────────────────
    - name: speckit.pro.status
      file: commands/pro.status.md
      description: "Rich status dashboard: pipeline phase icons, task progress bar, health signals, recent activity. Without a feature arg, shows a workspace overview of every feature in specs/ and its stuck phase."

    - name: speckit.pro.resume
      file: commands/pro.resume.md
      description: "Resume an interrupted autonomous run from the last saved session checkpoint"

    - name: speckit.pro.pickup
      file: commands/pro.pickup.md
      description: "Pick up an existing feature that has spec/plan/tasks but never started the implement loop — diagnoses the stuck phase, runs missing prerequisites, jumps into the loop. Most common entry point for resumed work."

    - name: speckit.pro.compress
      file: commands/pro.compress.md
      description: "Compress spec artifacts into a lean handoff.md for context-reset between iterations"

    # ── Local Ollama sidecar (token offload) ──────────────────────────────────
    - name: speckit.pro.local-prep
      file: commands/pro.local-prep.md
      description: "Offload prep-phase Markdown (repo-map, context-pack, risk register, test strategy, open questions) to local Ollama models. Self-skips if local_models.enabled is false or Ollama is unreachable; never aborts the pipeline."

    - name: speckit.pro.local-review
      file: commands/pro.local-review.md
      description: "First-pass implementation / test-gap / security review by local Ollama models. Writes evidence-pack Markdown that the stronger evaluator verifies — local model never has the final say."

    - name: speckit.pro.materialize
      file: commands/pro.materialize.md
      description: "Materialize tasks.md into per-task packets under <SPEC_DIR>/task-packets/TASK-NNN-<slug>.md. Local-model refined when Ollama is available; deterministic skeletons otherwise."

    - name: speckit.pro.local-metrics
      file: commands/pro.local-metrics.md
      description: "Read-only dashboard of local-model performance (latency, failure rate) and first-pass review quality (precision, recall) aggregated from .ai-knowledge/local-metrics.jsonl. Pure Python; never calls Claude or Ollama."

  config:
    - name: "pro-config.yml"
      template: "pro-config.template.yml"
      description: "SpecKit Pro configuration: gates, loop behavior, model, evaluation, quality settings"
      required: false

# ── Hooks on native SpecKit commands ──────────────────────────────────────────
# Pro augments the native pipeline at lifecycle boundaries.
# Native commands keep improving upstream; Pro adds intelligence on top.
# For multiple hooks per phase (e.g. reconcile → evaluate after implement), merge
# Pro into the project's `.specify/extensions.yml` — see this repo's template.
hooks:
  before_specify:
    command: speckit.pro.knowledge-sync
    args: "--mode prime"
    optional: true
    prompt: "Prime the agent with repo-level context from .repo-knowledge/ before writing the spec?"
    description: "Retrieval-only knowledge prime — grounds the agent in existing domain/architecture so it doesn't reinvent terms or duplicate bounded contexts. No-op if .repo-knowledge/ does not exist."

  after_specify:
    command: speckit.pro.deepen
    optional: true
    prompt: "Run adversarial spec deepener (investigate gaps, surface questions before clarify)?"
    description: "Audits the draft spec against a depth checklist, investigates gaps from local + capability-matched external sources, writes cited patches + a focused human-input file. Disabled by default — opt in via deepen.enabled."

  after_tasks:
    command: speckit.pro.contract
    optional: true
    prompt: "Generate sprint contract for the next implementation phase?"
    description: "Bridges task descriptions to concrete acceptance criteria before the implement loop starts"

  # Note: a second after_tasks entry — speckit.pro.local-prep + speckit.pro.materialize — chains
  # AFTER pro.contract. Both self-skip unless local_models.enabled is true AND Ollama is reachable.
  # The full chain (when local_models is on) becomes:
  #   /speckit.tasks → /pro.contract → /pro.local-prep → /pro.materialize
  # The order matters: pro.contract uses spec/plan/tasks (Claude); pro.local-prep generates the
  # repo-map / context-pack / risk register / test strategy / open questions that downstream
  # iterations and pro.local-review consume; pro.materialize lays out per-task packets.

  after_implement:
    command: speckit.pro.evaluate
    optional: true
    prompt: "Run Pro evaluator to grade the implementation against the sprint contract?"
    description: "Strict QA review — separate evaluator agent eliminates self-praise bias (Anthropic harness pattern)"

  # Note: additional after_implement entries chain in this order (declared in .specify/extensions.yml):
  #   git.commit → pro.reconcile → pro.local-review → pro.evaluate → pro.knowledge-sync
  # - pro.local-review writes evidence-pack drafts for pro.evaluate to verify (self-skips if local off).
  # - pro.knowledge-sync runs only when pro.evaluate returns PASS, so docs are never updated against
  #   unverified code.

tags:
  - "autonomous"
  - "orchestration"
  - "loop"
  - "productivity"
  - "process"
  - "long-run"
  - "self-healing"

defaults:
  gates:
    after_specify: true
    after_clarify: false
    after_plan: true
    after_tasks: false
    after_analyze: false
  loop:
    max_iterations: 20
    max_consecutive_failures: 3
    checkpoint_frequency: 3
  evaluation:
    enabled: true         # generator/evaluator split (Anthropic harness pattern)
    threshold: 70         # minimum score (0-100) for PASS
    max_revisions: 2      # revision passes before moving on
    sprint_contracts: true
  context:
    reset_mode: true      # write handoff.md per sprint (clean context reset)
    compression_threshold: 5
  quality:
    run_clarify: true
    run_analyze: true
    run_checklist: false
  pickup:
    ticket_match: true        # Scan specs/*/spec.md for ticket IDs in $ARGUMENTS
    title_match: true         # Heuristic title-noun match against existing specs
    branch_rename_prompt: true # Prompt to rename branch to detected team convention
  commit:
    commit_artifacts: false   # Default: keep specs/ and .ai-knowledge/ out of feature commits
    auto_gitignore: true      # Append .ai-knowledge/ (and conditionally specs/) to .gitignore
  knowledge:
    enabled: false              # Off by default — turn on after curating .repo-knowledge/
    prime_before_specify: true  # Pull retrieval bundle from .repo-knowledge/ before /speckit.specify
    prime_before_plan: false    # Re-prime if plan widens scope; default off for cost
    sync_after_evaluate: true   # Reconcile .repo-knowledge/ against the diff after evaluator PASS
    auto_apply_tier: "additive" # none | additive — never "destructive". Clarifying/breaking always proposal-only.
    sync_writes_to: "pro-knowledge.md"  # Per-feature review file, same pattern as pro-drift.md
    root_dir: ".repo-knowledge" # Versioned, committed. Distinct from .ai-knowledge/ (workspace-only).
  deepen:
    enabled: false               # Opt-in: front-loads rigor at the cost of operator time upfront
    run_after_specify: true      # Fire deepen between specify and clarify
    time_budget_seconds: 300     # Hard wall-clock cap per run
    per_source_budget_seconds: 30
    max_questions: 10            # Cap questions written to spec-questions.md
    sources:
      repo_knowledge: true       # .repo-knowledge/ (if present)
      code: true                 # local codebase via repo-ai + grep
      sibling_specs: true        # other specs/*/ directories
      git_history: true          # last 90 days of related commits/PRs
      issue_tracker: "auto"      # auto-use any capability-matched tool; "off" to disable
      documentation: "auto"      # auto-use any capability-matched tool; "off" to disable
      discussion: "off"          # chat/threads — low signal, off by default
      external_code_search: "auto"
  model: "claude-sonnet-4.6"
  agent_cli: "copilot"
  local_models:
    enabled: false                       # Opt-in: install Ollama + pull a 7B coder model first
    base_url: "http://localhost:11434"
    default_model: "qwen2.5-coder:7b"
    fast_model: "llama3.2:3b"
    code_model: "qwen2.5-coder:7b"
    review_model: "qwen2.5-coder:7b"
    security_model: "qwen2.5-coder:7b"
    timeout_seconds: 180
    num_ctx: 8192
    temperature: 0.2
    tasks:
      repo_map: true
      context_pack: true
      task_packets: true
      test_strategy: true
      risk_register: true
      open_questions: true
      local_review: true
    auto_run:
      after_tasks: true
      before_implement: false
      before_evaluate: true
    telemetry: true                                    # write one JSONL line per ollama-md.py call
    metrics_file: ".ai-knowledge/local-metrics.jsonl"  # relative paths resolve against project root
