# SpecKit Pro Configuration
# Copy to .specify/extensions/pro/pro-config.yml and customize.
# ─────────────────────────────────────────────────────────────────────────────
# Priority order (highest wins):
#   1. Environment variables (SPECKIT_PRO_*)
#   2. Local overrides (.specify/extensions/pro/pro-config.local.yml — gitignored)
#   3. This project config (.specify/extensions/pro/pro-config.yml)
#   4. Extension defaults (extension.yml → defaults)
# ─────────────────────────────────────────────────────────────────────────────

# ── Autonomous Pipeline Settings ─────────────────────────────────────────────
autonomous:
  # Whether to run the full pipeline in autonomous mode by default.
  # When false, /speckit.pro.run acts as a guided runner (shows plan, asks to confirm each step).
  enabled: true

  # Run the full pipeline (specify → clarify → plan → tasks → analyze → implement)
  # Set to false if you only want to use /speckit.pro.loop for the implement phase.
  full_pipeline: false

# ── Human Review Gates ────────────────────────────────────────────────────────
# true  = pause and wait for human review after this phase completes
# false = automatically proceed to next phase
gates:
  after_specify: true      # Recommended: always review the spec
  after_clarify: false     # Usually safe to auto-proceed
  after_plan: true         # Recommended: review tech plan before tasks
  after_tasks: false       # Usually safe to auto-proceed
  after_analyze: false     # Auto-proceed if analyze passes
  after_implement: false   # Auto-proceed (run /speckit.pro.status to review)

# ── Quality Settings ─────────────────────────────────────────────────────────
quality:
  # Run /speckit.clarify after /speckit.specify
  run_clarify: true

  # Run /speckit.analyze after /speckit.tasks (before implement)
  run_analyze: true

  # Require all checklists to be complete before implement
  # (uses standard SpecKit checklist gate logic)
  require_checklist: false

  # Abort implement loop if analyze finds CRITICAL issues
  abort_on_critical_analysis: true

# ── Autonomous Loop Settings ──────────────────────────────────────────────────
loop:
  # Maximum number of agent iterations before stopping
  # Each iteration handles one "work unit" (phase section or task group)
  max_iterations: 20

  # Number of consecutive failures before circuit breaker triggers
  max_consecutive_failures: 3

  # Create a checkpoint commit every N iterations
  checkpoint_frequency: 3

  # Whether to implement one full phase per iteration (true)
  # or one task group (false — more granular but more iterations)
  implement_phases: true

# ── Generator / Evaluator Split ──────────────────────────────────────────────
# Inspired by: https://www.anthropic.com/engineering/harness-design-long-running-apps
#
# Key insight: agents cannot reliably grade their own work. A separate skeptical
# evaluator is the single biggest quality unlock for long autonomous runs.
#
# When enabled, each generator sprint is followed by an evaluator sprint that:
# - Reads the sprint contract (acceptance criteria agreed BEFORE coding starts)
# - Reviews actual code files — not the generator's self-report in progress.md
# - Checks edge cases and error paths (not just happy path)
# - Returns PASS/NEEDS_REVISION/FAIL with specific, actionable feedback
# - Gives the generator up to max_revisions revision passes to fix issues
evaluation:
  # Enable the generator/evaluator split
  # Recommended: true for complex / production features; false for rapid prototyping
  enabled: false

  # Minimum score (0-100) for PASS. Higher = stricter.
  # 70 = "mostly works", 80 = production-ready, 90 = high-confidence
  threshold: 70

  # Max generator revision passes per sprint before moving on (prevents infinite loops)
  max_revisions: 2

  # Require sprint contracts before implementation
  # Generator proposes scope + acceptance criteria; evaluator ratifies before coding
  sprint_contracts: true

# ── Context Reset Protocol ─────────────────────────────────────────────────────
# Inspired by: Anthropic's finding that context resets outperform compaction for long runs
#
# "Context anxiety" — models prematurely wrap up work as they approach their context limit.
# Compaction summarizes in-place but doesn't eliminate anxiety. Context resets write a lean
# handoff.md so the next agent starts fresh with only what it needs.
context:
  # Write handoff.md after each sprint (context reset protocol)
  # The next agent loads handoff.md instead of the full artifact set (spec.md + plan.md + progress.md)
  # Set false to use compaction-only mode (legacy behavior)
  reset_mode: true

  # After this many iterations, also generate context-summary.md
  # (compresses spec.md + plan.md into ~90% fewer tokens)
  compression_threshold: 5

  # Auto-run /speckit.pro.compress before starting the implement loop
  auto_compress: false

  # Controls when Claude Code's auto-compaction fires.
  # Compaction fires at ~83.5% by default (after the 33K output buffer is reserved).
  # Set higher (e.g. 90) to squeeze more usable context before it fires.
  # Set lower (e.g. 70) for earlier, more conservative compaction on complex features.
  # Range: 1–100. Set to null to use Claude Code's built-in default.
  # Env: CLAUDE_AUTOCOMPACT_PCT_OVERRIDE
  # Note: proactive handoff.md resets (reset_mode: true) are preferred over compaction
  #       for long autonomous runs — compaction is lossy; handoffs are precise.
  autocompact_pct_override: ~  # null = use Claude Code default (~83.5%)

# ── Repo-level Knowledge Base ────────────────────────────────────────────────
# A versioned Markdown knowledge base at <project root>/.repo-knowledge/ that
# captures domain language, architecture, invariants, and decisions — the layer
# above per-feature specs and per-feature AGENT.md.
#
# When enabled, /speckit.pro.knowledge-sync runs in two modes:
#   • prime  — before /speckit.specify, retrieves top-k chunks relevant to the
#              new feature so the agent doesn't reinvent terms or violate
#              invariants in the spec it's about to write.
#   • sync   — after /speckit.pro.evaluate returns PASS, diffs the sprint's
#              code changes against .repo-knowledge/ claims and writes
#              <FEATURE_DIR>/pro-knowledge.md with proposed updates. Never
#              silently mutates the knowledge base; the operator approves
#              before edits graduate.
#
# Disabled by default. Turn on only after .repo-knowledge/INDEX.md exists and
# has been hand-curated for at least one bounded context. An auto-generated
# knowledge base that nobody reviews is worse than no knowledge base.
knowledge:
  # Master switch. When false, both hooks are no-ops.
  enabled: false

  # Run pro.knowledge-sync --mode prime as the first step of /pro.go and /pro.pickup.
  # Cost: ~5–15s extra per pipeline run with a warm repo-ai index. Skip if no .repo-knowledge/.
  prime_before_specify: true

  # Also re-prime before /speckit.plan (useful if the plan widens scope into
  # bounded contexts the spec didn't anticipate). Default off — most teams
  # don't need it and the cost adds up.
  prime_before_plan: false

  # Run pro.knowledge-sync --mode sync as the last step of after_implement,
  # AFTER pro.evaluate. Self-skips unless the evaluator returned PASS, so
  # docs are never updated against unverified code.
  sync_after_evaluate: true

  # What classes of edit may auto-merge into .repo-knowledge/ when sync runs.
  #   • "none"     — every proposal is review-only; nothing is auto-edited.
  #   • "additive" — only purely additive edits auto-apply (new endpoints in
  #                  architecture.md, new glossary terms). Never destructive.
  # Clarifying and breaking-tier edits are ALWAYS proposal-only regardless of
  # this setting. Files under decisions/, invariants.md, and domain/* are
  # never auto-edited under any policy.
  auto_apply_tier: "additive"

  # Where sync writes its review file. Same pattern as pro-drift.md.
  sync_writes_to: "pro-knowledge.md"

  # Directory name (relative to project root) for the knowledge base. This is
  # VERSIONED in git — distinct from .ai-knowledge/ which is workspace-only.
  root_dir: ".repo-knowledge"

# ── Effort Level Settings ─────────────────────────────────────────────────────
# Inspired by: https://claudefa.st/blog/guide/development/opus-4-7-best-practices
#
# Opus 4.7+ uses adaptive thinking — effort level is the primary cost/quality lever.
# Set per-phase effort to prevent over-spending on low-stakes work while keeping
# quality high where it compounds (planning, verification).
#
# Supported values: low | medium | high | xhigh | max
# Env override: SPECKIT_PRO_EFFORT_<PHASE> (e.g. SPECKIT_PRO_EFFORT_PLANNING=max)
effort:
  # Specify → Plan → Tasks phases — plan quality compounds into every execution step
  planning: "xhigh"
  # Implementation — specialists working from clear, pre-written plans
  execution: "high"
  # Evaluate, verify, security-audit — catching drift before it ships
  verification: "xhigh"
  # Exploratory research, docs lookups — cost-sensitive, not quality-critical
  exploratory: "medium"

# ── Model & Agent Settings ───────────────────────────────────────────────────
# AI model to use for autonomous iterations
# Common values: claude-sonnet-4.6, gpt-4.1, gemini-2.5-pro, claude-opus-4-5
model: "claude-sonnet-4.6"

# Sub-agent model (optional). When set, focused sub-agents run on this model
# while the orchestrator uses the primary `model`. A common pattern is Opus
# for orchestration and Sonnet for well-scoped sub-tasks — cuts cost without
# sacrificing quality on focused, clearly-scoped work.
# Leave empty to use the same model as the orchestrator.
# Env override: CLAUDE_CODE_SUBAGENT_MODEL
subagent_model: ""  # e.g. "claude-sonnet-4.6"

# Agent CLI binary name or path
# Supported: copilot, claude, gemini, codex, cursor
# Env override: SPECKIT_PRO_AGENT_CLI
agent_cli: "copilot"

# ── Checkpoint Settings ───────────────────────────────────────────────────────
checkpoint:
  # Prefix for auto-generated commit messages
  commit_prefix: "[Pro]"

  # Include feature name in checkpoint commit messages
  include_feature_name: true

# ── Commit Scope (PR-safety) ──────────────────────────────────────────────────
# Controls what files end up in feature-branch commits. The default is "PR-safe":
# workspace-only state stays out of commits intended for review.
commit:
  # Whether to include specs/ and .ai-knowledge/ in checkpoint commits.
  #
  # false (default, recommended):
  #   - Checkpoints stage code only — never .ai-knowledge/, never specs/
  #   - tasks.md [ ] → [x] updates are tracked locally but not committed
  #   - PRs review only production code, no SpecKit artifacts
  #   - Avoids the common pain of force-pushing to remove SpecKit artifacts before PR
  #
  # true:
  #   - Checkpoints include specs/ (for teams that version specs intentionally)
  #   - .ai-knowledge/ is STILL excluded (it's machine-generated workspace state)
  #   - Use this if your team wants spec.md, plan.md, tasks.md to live in git history
  commit_artifacts: false

  # Auto-append .ai-knowledge/ (and specs/ when commit_artifacts: false) to .gitignore
  # during Phase 5b. Most teams want this; disable if you manage .gitignore manually.
  auto_gitignore: true

# ── Pickup / Existing-Feature Scan ────────────────────────────────────────────
# Controls how /pro.go's pre-flight detects existing features that overlap with
# the requested work. The biggest source of stuck features in real projects is
# duplicate planning — a new spec is created when an old one already covers it.
pickup:
  # Scan specs/*/spec.md and plan.md for ticket IDs (regex [A-Z]+-[0-9]+) in $ARGUMENTS
  ticket_match: true

  # Heuristic title-noun match against existing spec H1 headings
  title_match: true

  # After /speckit.specify creates an NNN-feature-name branch, scan recent branches
  # and project rule files for a different naming convention; prompt to rename.
  branch_rename_prompt: true

# ── Notification Settings ─────────────────────────────────────────────────────
# (Future: webhook/notification integration)
notify:
  on_complete: false
  on_failure: false
  # webhook_url: "${SPECKIT_PRO_WEBHOOK_URL}"
