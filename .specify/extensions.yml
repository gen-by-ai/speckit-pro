installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: pro
    command: speckit.pro.knowledge-sync
    args: --mode prime
    enabled: true
    optional: true
    prompt: Prime the agent with .knowledge/ context before writing the spec?
    description: Retrieval-only knowledge prime — grounds the agent in existing domain/architecture. Auto-bootstraps .knowledge/ on first run when configured.
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: pro
    command: speckit.pro.knowledge-sync
    args: --mode prime
    enabled: true
    optional: true
    prompt: Re-prime from .knowledge/ before writing the plan?
    description: Surfaces domain/architecture/invariants again before /speckit.plan widens scope. Respects knowledge.prime_before_plan in pro-config.yml.
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  before_implement:
  - extension: pro
    command: speckit.pro.knowledge-sync
    args: --mode prime
    enabled: true
    optional: true
    prompt: Prime from .knowledge/ before implementation?
    description: Surfaces invariants and architecture context immediately before /speckit.implement. Respects knowledge.prime_before_implement in pro-config.yml.
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: pro
    command: speckit.pro.deepen
    enabled: true
    optional: true
    prompt: Run adversarial spec deepener — investigate gaps, surface questions before clarify?
    description: Audits the draft spec against a depth checklist, investigates gaps from local + capability-matched external sources, writes cited patches and a focused human-input file. Disabled by default — opt in via deepen.enabled in pro-config.yml.
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: pro
    command: speckit.pro.contract
    enabled: true
    optional: true
    prompt: Generate sprint contract for the next implementation phase?
    description: Bridges task descriptions to concrete acceptance criteria before
      the implement loop starts
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: pro
    command: speckit.pro.reconcile
    enabled: true
    optional: true
    prompt: Run Pro drift reconciliation — compare spec/plan to code and write pro-drift.md?
    description: Spec-vs-code drift triage before evaluator — complements static Markdown specs without silent auto-mutation
    condition: null
  - extension: pro
    command: speckit.pro.evaluate
    enabled: true
    optional: true
    prompt: Run Pro evaluator to grade the implementation against the sprint contract?
    description: Strict QA review — separate evaluator agent eliminates self-praise
      bias (Anthropic harness pattern)
    condition: null
  - extension: pro
    command: speckit.pro.knowledge-sync
    enabled: true
    optional: true
    prompt: Reconcile .knowledge/ against this sprint's code changes? (runs only on evaluator PASS)
    description: Diffs the diff against repo-level knowledge claims; writes pro-knowledge.md proposals. Self-skips if evaluator did not return PASS, if .knowledge/ does not exist, or if only tests/fixtures changed.
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
